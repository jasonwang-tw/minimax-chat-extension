<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMax AI Chat 設定</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="header-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8" />
          <rect width="16" height="12" x="4" y="8" rx="2" />
          <path d="M2 14h2" />
          <path d="M20 14h2" />
          <path d="M15 13v2" />
          <path d="M9 13v2" />
        </svg>
        <span>MiniMax AI Chat 設定</span>
      </div>
    </header>

    <main class="main">
      <section class="section">
        <h2>API 設定</h2>
        <div class="form-group">
          <label for="apiKey">MiniMax API Key</label>
          <div class="input-wrapper">
            <input type="password" id="apiKey" placeholder="輸入您的 API Key">
            <button id="toggleKey" class="btn-icon" type="button">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p class="hint">用於一般對話與文生圖，請至 <a
              href="https://platform.minimax.io/user-center/basic-information/interface-key" target="_blank">MiniMax
              Token Plan</a> 取得</p>
        </div>
        <button id="testBtn" class="btn-secondary">測試 MiniMax 連線</button>

        <div class="divider"></div>

        <div class="form-group">
          <label for="geminiApiKey">Gemini API Key（圖片分析用）</label>
          <div class="input-wrapper">
            <input type="password" id="geminiApiKey" placeholder="輸入您的 Gemini API Key">
            <button id="toggleGeminiKey" class="btn-icon" type="button">
              <svg id="geminiEyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p class="hint">用於截圖與圖片分析，免費申請 <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI
              Studio</a></p>
        </div>
        <button id="testGeminiBtn" class="btn-secondary">測試 Gemini 連線</button>
        <div class="divider"></div>
        <button id="saveBtn" class="btn-primary">儲存設定</button>
      </section>

      <section class="section">
        <h2>對話設定</h2>
        <div class="form-group">
          <label for="maxHistory">最大歷史紀錄數</label>
          <select id="maxHistory">
            <option value="20">20 筆</option>
            <option value="50" selected>50 筆</option>
            <option value="100">100 筆</option>
          </select>
        </div>
      </section>

      <section class="section">
        <h2>關於</h2>
        <div class="about-info">
          <p><strong>版本:</strong> 1.0.0</p>
          <p><strong>對話模型:</strong> MiniMax-M2.7</p>
          <p><strong>圖片模型:</strong> Gemini 2.5 Flash-lite</p>
          <p>串接 MiniMax API 的 Chrome 擴充功能</p>
        </div>
      </section>

      <div id="message" class="message hidden"></div>
    </main>
  </div>

  <script src="options.js"></script>
</body>

</html>
