<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMax AI Chat</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        <span>MiniMax AI</span>
      </div>
      <div class="header-actions">
        <button id="toggleHistory" class="btn-icon" title="歷史紀錄">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        </button>
        <button id="openSettings" class="btn-icon" title="設定">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </header>

    <!-- Chat Area with History Overlay -->
    <main class="chat-area">
      <!-- History Panel -->
      <aside id="historyPanel" class="history-panel hidden">
        <div class="history-header">
          <h3>歷史紀錄</h3>
          <button id="clearHistory" class="btn-text btn-danger">全部清除</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>

      <div id="chatMessages" class="chat-messages"></div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        <p>開始與 MiniMax AI 對話</p>
      </div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="typing-indicator hidden">
        <span></span><span></span><span></span>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="input-area">
      <!-- Image Preview -->
      <div id="imagePreview" class="image-preview hidden">
        <img id="previewImg" src="" alt="預覽">
        <button id="removeImage" class="btn-remove">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <span id="imageModeLabel" class="image-mode-label"></span>
      </div>

      <!-- Translation Panel -->
      <div id="translatePanel" class="translate-panel hidden">
        <div class="translate-langs">
          <select id="sourceLang" class="lang-select">
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">簡體中文</option>
            <option value="en">英文</option>
            <option value="ja">日文</option>
            <option value="ko">韓文</option>
            <option value="fr">法文</option>
            <option value="de">德文</option>
            <option value="es">西班牙文</option>
            <option value="th">泰文</option>
            <option value="vi">越南文</option>
          </select>
          <svg class="lang-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <select id="targetLang" class="lang-select">
            <option value="en" selected>英文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">簡體中文</option>
            <option value="ja">日文</option>
            <option value="ko">韓文</option>
            <option value="fr">法文</option>
            <option value="de">德文</option>
            <option value="es">西班牙文</option>
            <option value="th">泰文</option>
            <option value="vi">越南文</option>
          </select>
        </div>
      </div>

      <!-- Tool Buttons -->
      <div class="tool-bar">
        <!-- 截圖 -->
        <button id="screenshotBtn" class="btn-tool" title="全頁截圖">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <!-- 區域截圖 -->
        <button id="regionScreenshotBtn" class="btn-tool" title="區域截圖">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
        </button>
        <!-- 上傳圖片 -->
        <button id="uploadBtn" class="btn-tool" title="上傳圖片">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <!-- OCR 文字辨識 -->
        <button id="ocrBtn" class="btn-tool" title="OCR 文字辨識">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h3"/><path d="M17 4h3v3"/><path d="M20 17v3h-3"/><path d="M7 20H4v-3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
        </button>
        <!-- 翻譯切換 -->
        <button id="translateBtn" class="btn-tool btn-tool-toggle" title="翻譯模式">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
        </button>
        <input type="file" id="imageInput" accept="image/*" hidden>
      </div>

      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="輸入訊息..." rows="1"></textarea>
        <button id="sendBtn" class="btn-send" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
      <p id="statusText" class="status-text"></p>
    </footer>
  </div>

  <!-- Region Screenshot Modal -->
  <div id="regionModal" class="region-modal hidden">
    <div class="region-modal-header">
      <span>拖曳選取截圖範圍</span>
      <button id="cancelRegion" class="btn-text">取消</button>
    </div>
    <div class="region-canvas-wrapper">
      <canvas id="regionCanvas"></canvas>
      <div id="selectionRect" class="selection-rect hidden"></div>
    </div>
    <div class="region-modal-footer hidden" id="regionConfirmBar">
      <button id="confirmRegion" class="btn-primary-sm">確認截圖</button>
      <button id="redoRegion" class="btn-secondary-sm">重新選取</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
